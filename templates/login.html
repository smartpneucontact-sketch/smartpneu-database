<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPneu Database - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .login-card h2 {
            color: #2c3e50;
            font-weight: bold;
        }
        .login-card .icon {
            font-size: 3rem;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <i class="bi bi-gear-wide-connected icon d-block mb-3"></i>
        <h2>SmartPneu Database</h2>
        <p class="text-muted mb-4">Tire Recognition & Management</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control form-control-lg text-center"
                       placeholder="Enter password" autofocus required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-unlock me-2"></i>Login
            </button>
        </form>
    </div>
</body>
</html>
